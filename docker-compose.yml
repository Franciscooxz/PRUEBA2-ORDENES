# Levanta PostgreSQL para la API de órdenes.
# (El servicio de la app se añade junto con el Dockerfile en la fase final.)
services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: wind_orders
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wind_orders"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
