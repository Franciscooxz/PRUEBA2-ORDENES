# Levanta la API de órdenes junto con PostgreSQL.
# La app aplica migraciones y siembra productos automáticamente al arrancar.
services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: wind_orders
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wind_orders"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgres://postgres:postgres@db:5432/wind_orders?sslmode=disable"
      JWT_SECRET: "dev-secret-cambia-en-produccion"
      JWT_EXPIRATION: "24h"
      PORT: "8080"
    ports:
      - "8080:8080"

volumes:
  pgdata:
