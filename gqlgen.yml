# Configuración de gqlgen. Ejecuta: go tool gqlgen generate

schema:
  - graph/schema.graphqls

exec:
  filename: internal/delivery/graphql/generated/generated.go
  package: generated

model:
  # Modelos generados SOLO para los tipos que no existen en el dominio
  # (AuthPayload, ProductPage, OrderPage y los inputs).
  filename: internal/delivery/graphql/model/models_gen.go
  package: model

resolver:
  layout: follow-schema
  dir: internal/delivery/graphql
  package: graphql
  filename_template: "{name}.resolvers.go"

# Enlaza automáticamente los tipos GraphQL con las entidades del dominio que
# tengan el mismo nombre (User, Product, Order, OrderItem, OrderStatus,
# ProductFilter). Como domain.Order tiene UserID (no User) y domain.OrderItem
# tiene ProductID (no Product), gqlgen genera field resolvers para `Order.user`
# y `OrderItem.product` — el punto donde entra el DataLoader.
autobind:
  - ordersapi/internal/domain

models:
  ID:
    model: github.com/99designs/gqlgen/graphql.ID
  Int:
    model: github.com/99designs/gqlgen/graphql.Int
